<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇门遁甲 - 动态式盘渲染引擎</title>
    <style>
        body {
            background-color: #121212; /* 深色护眼模式，符合严谨的工具软件规范 */
            color: #E0E0E0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
        }
        .canvas-container {
            position: relative;
            background-color: #1E1E1E;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            padding: 20px;
        }
        canvas {
            display: block;
        }
        h2 {
            letter-spacing: 2px;
            color: #D4AF37; /* 专业法器常用的暗金色 */
        }
    </style>
</head>
<body>

    <h2>太极时空矩阵渲染测试</h2>
    
    <div class="canvas-container">
        <canvas id="qimenCanvas" width="600" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('qimenCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2;

        function initEngine() {
            // 解决高分屏模糊问题
            const dpr = window.devicePixelRatio || 1;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            
            drawEarthPlate();
        }
// 在 script 标签中追加以下异步调用函数
        
        async function fetchQimenData() {
            // 获取当下设备的系统时间，准备传给后端
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const hour = now.getHours();
            const minute = now.getMinutes();

            try {
                const response = await fetch(`http://127.0.0.1:8000/api/v1/astronomy/bazi_qimen_params?year=${year}&month=${month}&day=${day}&hour=${hour}&minute=${minute}`);
                const data = await response.json();
                
                // 将后端严密计算的干支数据打印在控制台进行核对
                console.log("=== 奇门遁甲核心时空参数获取成功 ===");
                console.log(`当前节气: ${data.solar_term}`);
                console.log(`日干支 (日柱): ${data.day_pillar}`);
                console.log(`时干支 (时柱): ${data.hour_pillar}`);
                console.log("======================================");
                
                // 此处预留：后续将获取到的干支数据传入 Canvas 渲染引擎
                
            } catch (error) {
                console.error("引擎连接失败，请确保 FastAPI 后端已在 8000 端口启动:", error);
            }
        }

        // 修改引擎启动逻辑
        function initEngine() {
            // ... (保留之前的 dpr 缩放和 drawEarthPlate 代码)
            
            // 绘制静态底盘
            drawEarthPlate();
            
            // 发送网络请求，获取实时动态参数
            fetchQimenData(); 
        }
        
        function drawEarthPlate() {
            // 绘制基础底盘 (洛书九宫)
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.6)'; // 暗金色线条
            ctx.lineWidth = 1.5;

            // 绘制最外层天象轨道
            ctx.beginPath();
            ctx.arc(centerX, centerY, 280, 0, 2 * Math.PI);
            ctx.stroke();

            // 绘制内层九宫格
            const gridSize = 140;
            const startX = centerX - (gridSize * 1.5);
            const startY = centerY - (gridSize * 1.5);

            // 绘制矩阵网格
            for (let i = 0; i <= 3; i++) {
                // 垂直线
                ctx.beginPath();
                ctx.moveTo(startX + i * gridSize, startY);
                ctx.lineTo(startX + i * gridSize, startY + gridSize * 3);
                ctx.stroke();
                // 水平线
                ctx.beginPath();
                ctx.moveTo(startX, startY + i * gridSize);
                ctx.lineTo(startX + gridSize * 3, startY + i * gridSize);
                ctx.stroke();
            }

            // 填充九宫底盘绝对坐标系（后天八卦）
            const palaces = [
                "巽四 (木)", "离九 (火)", "坤二 (土)",
                "震三 (木)", "中五 (土)", "兑七 (金)",
                "艮八 (土)", "坎一 (水)", "乾六 (金)"
            ];

            ctx.fillStyle = '#D4AF37';
            ctx.font = 'bold 18px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            let idx = 0;
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    let x = startX + c * gridSize + (gridSize / 2);
                    let y = startY + r * gridSize + (gridSize / 2);
                    ctx.fillText(palaces[idx], x, y);
                    idx++;
                }
            }
        }

        // 启动渲染引擎
        initEngine();
    </script>
</body>
</html>
